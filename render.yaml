services:
  - type: web
    name: skill-exchange-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: python manage.py migrate --noinput && gunicorn skill_exchange.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: skill_exchange.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.1"
      - key: DATABASE_URL
        fromDatabase:
          name: skill-exchange-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: skill-exchange-backend-hu3n.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://skill-exchange-platform-phi.vercel.app,http://localhost:5173
      - key: CSRF_TRUSTED_ORIGINS
        value: https://skill-exchange-backend-hu3n.onrender.com,https://skill-exchange-platform-phi.vercel.app

databases:
  - name: skill-exchange-db
    plan: free
    databaseName: skill_exchange_db
